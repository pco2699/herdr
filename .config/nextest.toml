# Integration tests (tests/*.rs) spawn real PTYs, Unix sockets, and background
# servers, so they are timing-sensitive under the heavy parallelism of CI
# runners — e.g. asserting that pane output appears within a few seconds can miss
# its deadline purely from contention. Retry those a couple of times so transient
# load doesn't fail the whole run. Unit tests keep retries = 0 so genuine
# flakiness there stays visible.
[profile.default]
retries = 0

[[profile.default.overrides]]
filter = "kind(test)"
retries = 2
