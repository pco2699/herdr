# Many tests spawn real PTYs, shells, Unix sockets, and background servers and
# assert that output/files appear within a few seconds. Under the heavy
# parallelism of CI (and release `just check`) those deadlines can be missed
# purely from contention, and such tests live both in tests/*.rs and as bin unit
# tests. Retry every test a couple of times: retries only rescue non-deterministic
# flakiness — a genuinely broken test fails all attempts and is still caught.
[profile.default]
retries = 2
